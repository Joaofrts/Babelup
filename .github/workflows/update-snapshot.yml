name: Update Project Snapshot

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Docker containers
        run: |
          echo "Starting Docker containers..."
          docker-compose up -d
          echo "Waiting for services to stabilize..."
          sleep 10
          docker-compose ps
          docker-compose logs --tail=20

      - name: Wait for backend to be ready
        run: |
          max_attempts=40
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -s http://localhost:8080/api/usuarios > /dev/null 2>&1; then
              echo "✓ Backend is ready!"
              break
            fi
            echo "Attempt $attempt/$max_attempts: Waiting for backend..."
            sleep 3
            attempt=$((attempt + 1))
          done
          
          if [ $attempt -gt $max_attempts ]; then
            echo "✗ Backend failed to start"
            docker-compose logs backend
            exit 1
          fi

      - name: Wait for frontend to be ready
        run: |
          max_attempts=40
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173/ 2>/dev/null)
            if [ "$response" = "200" ] || [ "$response" = "304" ]; then
              echo "✓ Frontend is ready!"
              break
            fi
            echo "Attempt $attempt/$max_attempts: Waiting for frontend (HTTP $response)..."
            sleep 3
            attempt=$((attempt + 1))
          done
          
          if [ $attempt -gt $max_attempts ]; then
            echo "✗ Frontend failed to start"
            docker-compose logs frontend
            exit 1
          fi

      - name: Install dependencies for screenshot
        run: |
          npm install --save-dev playwright@latest
          npx playwright install chromium --with-deps

      - name: Create screenshot script
        run: |
          cat > take-screenshot.js << 'SCRIPT_EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');

          (async () => {
            let browser;
            try {
              console.log('Launching browser...');
              browser = await chromium.launch({ 
                headless: true,
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              
              const page = await browser.newPage();
              page.setDefaultTimeout(30000);
              page.setDefaultNavigationTimeout(30000);
              
              console.log('Navigating to http://localhost:5173...');
              const response = await page.goto('http://localhost:5173', { 
                waitUntil: 'networkidle2',
                timeout: 30000
              });
              
              if (!response) {
                throw new Error('Failed to navigate to application');
              }
              
              console.log('Page loaded. Waiting for rendering...');
              await page.waitForLoadState('networkidle');
              
              // Create screenshots directory
              const screenshotDir = './screenshots';
              if (!fs.existsSync(screenshotDir)) {
                fs.mkdirSync(screenshotDir, { recursive: true });
              }
              
              // Take full page screenshot
              const filename = path.join(screenshotDir, 'project-snapshot.png');
              console.log(`Taking screenshot: ${filename}`);
              
              await page.screenshot({ 
                path: filename, 
                fullPage: true,
                type: 'png'
              });
              
              console.log(`✓ Screenshot saved successfully: ${filename}`);
              const stats = fs.statSync(filename);
              console.log(`   File size: ${(stats.size / 1024).toFixed(2)} KB`);
              
              await browser.close();
              process.exit(0);
            } catch (error) {
              console.error('✗ Error taking screenshot:', error.message);
              if (browser) {
                await browser.close();
              }
              process.exit(1);
            }
          })();
          SCRIPT_EOF
        
      - name: Take application screenshot
        run: node take-screenshot.js
        timeout-minutes: 5

      - name: Verify screenshot
        run: |
          if [ -f "screenshots/project-snapshot.png" ]; then
            echo "✓ Screenshot verified"
            ls -lh screenshots/project-snapshot.png
            file screenshots/project-snapshot.png
          else
            echo "✗ Screenshot not found"
            exit 1
          fi

      - name: Commit and push snapshot update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if screenshot has changed
          if git diff --quiet HEAD -- screenshots/; then
            echo "ℹ No changes in screenshot"
          else
            echo "ℹ Screenshot has been updated"
            git add screenshots/project-snapshot.png
            git commit -m "chore: update project snapshot from latest merge [skip ci]" \
              -m "Automatic snapshot update on: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD:refs/heads/${{ github.ref_name }}
            echo "✓ Changes pushed successfully"
          fi

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker containers status ==="
          docker-compose ps
          echo "=== Docker logs ==="
          docker-compose logs --tail=50

      - name: Stop Docker containers
        if: always()
        run: |
          echo "Stopping Docker containers..."
          docker-compose down --volumes || true
